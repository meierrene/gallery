<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/translate@1/translate.min.js"
    ></script>
    <script
      type="module"
      src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"
    ></script>
    <script defer type="module" src="script.js"></script>
    <title>Meier's Web Guide</title>
  </head>

  <body>
    <header>
      <div class="upper-menu">
        <p class="date-display">Loading...</p>
        <div class="flags">
          <img src="src/img/uk_640.png" alt="en-UK" class="flag-btn" />
          <img src="src/img/germany_640.png" alt="de-DE" class="flag-btn" />
          <img src="src/img/brazil_640.png" alt="pt-BR" class="flag-btn" />
          <img src="src/img/finland_640.png" alt="fi-FI" class="flag-btn" />
        </div>
      </div>
    </header>

    <main>
      <h1 class="main-title">Meier's Web Guide</h1>
      <h2 class="main-title">Welcome!</h2>
      <div class="column-container">
        <div class="column-1">
          <p class="column-1-title">E-mail's</p>
          <a href="https://www.gmail.com/" target="_blank">
            <button class="default-btn">
              Gmail <img src="src/img/gmail.png" alt="Gmail" />
            </button>
          </a>
          <a href="https://login.yahoo.com/" target="_blank">
            <button class="default-btn">
              Yahoo! <img src="src/img/yahoo.png" alt="Yahoo" />
            </button>
          </a>
          <a href="https://outlook.office.com/mail/" target="_blank">
            <button class="default-btn">
              Outlook Webmail <img src="src/img/outlook.png" alt="Outlook" />
            </button>
          </a>
        </div>

        <div class="column-2">
          <p class="column-2-title">Corporation</p>
          <a
            href="https://apps.voeazul.com.br/PasseLivre/Account/Login/"
            target="_blank"
          >
            <button class="default-btn">Passe Livre</button>
          </a>
          <a
            href="https://concessaopassagens.voeazul.com.br/ConcessaoPassagensWeb/Login"
            target="_blank"
          >
            <button class="default-btn">Concessão de Passagens</button>
          </a>
          <a href="https://www.myidtravel.com/myidtravel/" target="_blank">
            <button class="default-btn">MyID Travel</button>
          </a>
          <a href="https://sabre.voeazul.com.br/" target="_blank">
            <button class="default-btn">Sabre Crew access</button>
          </a>
          <a href="https://isa.voeazul.com.br/login/#/azul" target="_blank">
            <button class="default-btn">Portal ISA</button>
          </a>
          <a href="https://voeazul.service-now.com/" target="_blank">
            <button class="default-btn">Service Now</button>
          </a>
          <a href="https://azul.mint-online.com/azul/" target="_blank">
            <button class="default-btn">Mint</button>
          </a>
          <a
            href="https://uniazul.atenalms.com.br/skin/atena/login"
            target="_blank"
          >
            <button class="default-btn">EaD Webaula</button>
          </a>
          <a href="https://docunet-online-br.vistair.com/" target="_blank">
            <button class="default-btn">Docunet</button>
          </a>
        </div>

        <div class="column-3 hidden">
          <p class="column-3-title">René's leisure</p>
          <a href="https://bricklink.com/" target="_blank">
            <button class="default-btn">Brick Link</button>
          </a>
          <a
            href="https://www.lego.com/de-de/pick-and-build/pick-a-brick"
            target="_blank"
          >
            <button class="default-btn">Lego</button>
          </a>
        </div>

        <div class="column-4 hidden">
          <p class="column-4-title">René's restaurant</p>
          <a href="https://www.casadaesfihadelivery.com.br/" target="_blank">
            <button class="default-btn">Casa da Esfiha</button>
          </a>
        </div>
      </div>
    </main>
    <footer>
      <span class="footer-text">
        Copyright &copy; <span class="year"></span> by
      </span>
      <a href="https://github.com/meierrene" target="_blank" class="author"
        >René Meier</a
      >
      <a href="https://www.linkedin.com/in/renemeierdev/" target="_black"
        ><ion-icon name="logo-linkedin"></ion-icon
      ></a>
      <a href="https://www.instagram.com/renemeier.de/" target="_black"
        ><ion-icon name="logo-instagram"></ion-icon></a
      ><input type="checkbox" class="secret-btn" />
    </footer>
  </body>
</html>
